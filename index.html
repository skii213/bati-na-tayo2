<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bati Na Tayo? 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffc0cb,#ff69b4);
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:60px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    border:none;
    border-radius:50px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:700;
}

#yesBtn{
    background:white;
    color:#ff1493;
}

#noBtn{
    background:#ff4d6d;
    color:white;
}

.message{
    margin-top:25px;
    color:white;
    font-size:22px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">
    <h1>diba bati tayo?</h1>

    <div class="buttons">
        <button id="yesBtn" onclick="yesClick()">YES</button>
        <button id="noBtn" onclick="noClick()">NO</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
let yesSize = 18;

const begMessages = [
"ihh",
"IHHHHHHHHHHHH",
"dalina kase",
"Sige na donggggggggggggg",
"please bisayaaaaaaa"
];

function yesClick(){
    document.getElementById("message").innerHTML =
    "nice bye";
}

function noClick(){
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    // make YES button bigger
    yesSize += 8;
    yesBtn.style.fontSize = yesSize + "px";
    yesBtn.style.padding = (yesSize/2) + "px " + (yesSize) + "px";

    // begging messages
    const randomMsg = begMessages[Math.floor(Math.random()*begMessages.length)];
    message.innerHTML = randomMsg;
}
</script>

</body>
</html>
